<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma AI Lokal ✨</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --user-bubble: linear-gradient(135deg, #a855f7, #ec4899);
            --ai-bubble: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            text-align: center;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        .header span {
            background: linear-gradient(135deg, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #chatbox {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .user-msg { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: var(--ai-bubble); align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area {
            padding: 20px;
            background: var(--chat-bg);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            outline: none;
        }
        button {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            background: var(--user-bubble);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .typing { font-style: italic; color: var(--text-muted); font-size: 0.9rem; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="header">✨ <span>Gemma AI Lokal</span> ✨</div>
    <div id="chatbox">
        <div class="message ai-msg">Halo bang! Gua AI lokal lu yang jalan di laptop. Mau nanya apa? 🚀</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Tanya Gemma..." onkeypress="if(event.key==='Enter') kirimPesan()">
        <button id="sendBtn" onclick="kirimPesan()">Send</button>
    </div>

    <script>
        // DATA BERDASARKAN SCREENSHOT LU
        const API_URL = "https://4f1400f3b91192.lhr.life/api/chat";
        const MODEL = "hf.co/bartowski/huihui-ai_gemma-3-1b-it-abliterated-GGUF:Q8_0";

        async function kirimPesan() {
            const input = document.getElementById("userInput");
            const chatbox = document.getElementById("chatbox");
            const btn = document.getElementById("sendBtn");
            const text = input.value.trim();
            if (!text) return;

            chatbox.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = "";
            const loadId = "load-" + Date.now();
            chatbox.innerHTML += `<div id="${loadId}" class="typing">Gemma lagi mikir... 💭</div>`;
            chatbox.scrollTop = chatbox.scrollHeight;
            
            input.disabled = true; btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [{ role: "user", content: text }],
                        stream: false
                    })
                });
                const data = await response.json();
                document.getElementById(loadId).remove();
                chatbox.innerHTML += `<div class="message ai-msg">${data.message.content.replace(/\n/g, '<br>')}</div>`;
            } catch (e) {
                if(document.getElementById(loadId)) document.getElementById(loadId).remove();
                chatbox.innerHTML += `<div class="message ai-msg" style="background:#7f1d1d;">Koneksi Gagal! Cek CMD SSH & Restart Ollama bang.</div>`;
            }
            input.disabled = false; btn.disabled = false; input.focus();
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
